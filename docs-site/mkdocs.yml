site_name: Othello AI Docs
site_url: https://billzi2016.github.io/Othello-AI/docs/
repo_url: https://github.com/billzi2016/Othello-AI
repo_name: billzi2016/Othello-AI
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: zh
          name: 简体中文
          default: true
          build: true
        - locale: en
          name: English
          build: true
          nav:
            - GitHub: https://github.com/billzi2016/Othello-AI
            - Home: en/index.md
            - Project README: en/project-readme.md
            - Specification:
                - Quick start: en/quick-start.md
                - Structure: en/project-structure.md
                - Browser runtime: en/browser-runtime.md
                - Deployment: en/deployment.md
                - Maintenance: en/maintenance.md
            - Algorithm: en/algorithm-deep-dive.md
            - JavaScript layer: en/javascript.md
            - Rust engine: en/rust-ai.md
            - Wasm bindings: en/wasm.md
            - Process documents:
                - MkDocs docs site PRD: en/mkdocs-prd.md
                - GitHub Actions PRD: en/github-actions-prd.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

nav:
  - GitHub: https://github.com/billzi2016/Othello-AI
  - 首页: zh/README.md
  - 项目 README: zh/project-readme.zh.md
  - 项目说明:
      - 概览: zh/index.zh.md
      - 快速开始: zh/quick-start.zh.md
      - 结构: zh/project-structure.zh.md
      - 浏览器运行: zh/browser-runtime.zh.md
      - 部署: zh/deployment.zh.md
      - 维护: zh/maintenance.zh.md
  - 算法: zh/algorithm-deep-dive.zh.md
  - JavaScript 层: zh/javascript.zh.md
  - Rust 引擎: zh/rust-ai.zh.md
  - Wasm 绑定: zh/wasm.zh.md
  - 过程文档:
      - MkDocs 文档站 PRD: zh/mkdocs-prd.zh.md
      - GitHub Actions PRD: zh/github-actions-prd.zh.md
