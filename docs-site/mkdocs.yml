site_name: Othello AI Docs
site_url: https://billzi2016.github.io/Othello-AI/docs/
repo_url: https://github.com/billzi2016/Othello-AI
repo_name: billzi2016/Othello-AI
docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  features:
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight

plugins:
  - search
  - i18n:
      docs_structure: folder
      languages:
        - locale: zh
          name: 简体中文
          default: true
          build: true
        - locale: en
          name: English
          build: true
          nav:
            - GitHub: https://github.com/billzi2016/Othello-AI
            - Home: en/index.md
            - Project README: en/project-readme.md
            - Specification:
                - Quick start: en/quick-start.md
                - Structure: en/project-structure.md
                - Browser runtime: en/browser-runtime.md
                - Deployment: en/deployment.md
                - Maintenance: en/maintenance.md
            - Algorithm: en/algorithm-deep-dive.md
            - JavaScript layer: en/javascript.md
            - Rust engine: en/rust-ai.md
            - Wasm bindings: en/wasm.md
            - Process documents:
                - MkDocs docs site PRD: en/mkdocs-prd.md
                - GitHub Actions PRD: en/github-actions-prd.md

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences

nav:
  - GitHub: https://github.com/billzi2016/Othello-AI
  - Home: zh/README.md
  - Project README: zh/project-readme.zh.md
  - Specification:
      - Overview: zh/index.zh.md
      - Quick start: zh/quick-start.zh.md
      - Structure: zh/project-structure.zh.md
      - Browser runtime: zh/browser-runtime.zh.md
      - Deployment: zh/deployment.zh.md
      - Maintenance: zh/maintenance.zh.md
  - Algorithm: zh/algorithm-deep-dive.zh.md
  - JavaScript layer: zh/javascript.zh.md
  - Rust engine: zh/rust-ai.zh.md
  - Wasm bindings: zh/wasm.zh.md
  - Process documents:
      - MkDocs 文档站 PRD: zh/mkdocs-prd.zh.md
      - GitHub Actions PRD: zh/github-actions-prd.zh.md
